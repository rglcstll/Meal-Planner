<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" />
    <link rel="stylesheet" th:href="@{/css/forgot-password.css}" />
  </head>
  <body>
    <div class="container">
      <div id="form-container">
        <div class="logo">📧</div> <h1>Forgot Password?</h1>
        <p>Enter your email to receive a reset link.</p>

        <div id="responseMessage">
          <p th:if="${message}" class="message" th:text="${message}"></p>
          <p th:if="${error}" class="error" th:text="${error}"></p>
        </div>

        <form id="forgotPasswordForm">
          <input
            type="email"
            id="email"
            name="email"
            class="input-field"
            placeholder="Enter your email"
            required
          />
          <button type="submit" class="btn">Send Reset Link</button>
        </form>
      </div>

      <div id="success-container" class="success-container">
        <div class="check-icon">✅</div> <h2>Email Sent!</h2>
        <p class="message">
          A password reset link has been sent to your email address. Please
          check your inbox and follow the instructions.
        </p>
        <button id="backBtn" class="btn">Back to Login</button>
      </div>
    </div>

    <script th:inline="javascript">
      /*<![CDATA[*/
      var R_APP_CONTEXT_PATH = /*[[@{/}]]*/ ''; 
      // Ensure R_APP_CONTEXT_PATH ends with a slash if it's not just "/"
      if (R_APP_CONTEXT_PATH !== '/' && !R_APP_CONTEXT_PATH.endsWith('/')) {
          R_APP_CONTEXT_PATH += '/';
      }
      /*]]>*/

      document
        .getElementById("forgotPasswordForm")
        .addEventListener("submit", function (event) {
          event.preventDefault(); // Prevent default form submission
          const email = document.getElementById("email").value;
          const responseMessageDiv = document.getElementById("responseMessage");
          const formContainer = document.getElementById("form-container");
          const successContainer = document.getElementById("success-container");

          // Clear previous messages
          responseMessageDiv.innerHTML = '';

          // Construct the correct URL
          const submitUrl = R_APP_CONTEXT_PATH + "user/forgot-password";

          fetch(submitUrl, { 
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "email=" + encodeURIComponent(email),
          })
            .then((response) => {
              if (response.ok) {
                return response.text(); 
              } else {
                return response.text().then(text => { throw new Error(text || 'Server error'); });
              }
            })
            .then((data) => {
              if (data.toLowerCase().includes("sent") || data.toLowerCase().includes("reset link has been sent")) {
                formContainer.style.display = "none";
                successContainer.style.display = "block";
              } else {
                responseMessageDiv.innerHTML = `<p class="error">${data}</p>`;
              }
            })
            .catch((error) => {
              responseMessageDiv.innerHTML = `<p class="error">${error.message || 'An error occurred. Please try again.'}</p>`;
            });
        });

      document.getElementById("backBtn").addEventListener("click", function () {
        // Make sure this link also considers context path if login isn't at root
        window.location.href = R_APP_CONTEXT_PATH + "user/login"; 
      });
    </script>
  </body>
</html>
