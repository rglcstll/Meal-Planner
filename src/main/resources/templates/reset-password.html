<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
    />
    <link rel="stylesheet" th:href="@{/css/reset-password.css}" />

  </head>
  <body>
    <div class="container">
      <h1>Reset Your Password</h1>

      <div th:if="${error}" class="error" th:text="${error}"></div>

      <form th:action="@{/user/reset-password}" method="POST">
        <input type="hidden" name="token" th:value="${token}" />

        <input
          type="password"
          name="newPassword"
          class="input-field"
          placeholder="Enter new password"
          required
        />
        <input
          type="password"
          name="confirmPassword"
          class="input-field"
          placeholder="Confirm new password"
          required
        />
        <button type="submit" class="btn">Reset Password</button>
      </form>
    </div>

    <script>
      // This script attempts to get a 'token' from the URL query parameters
      // and populate the hidden input field with name="token".
      // This can be useful if the token is passed via URL and needs to be
      // inserted client-side, for example, if Thymeleaf isn't populating it
      // in a particular scenario or as a fallback.
      document.addEventListener("DOMContentLoaded", function () {
        const params = new URLSearchParams(window.location.search);
        const tokenValueFromUrl = params.get("token"); // Get token from URL

        // Find the hidden input field by its name attribute
        const hiddenTokenField = document.querySelector('input[name="token"]');

        if (hiddenTokenField && tokenValueFromUrl) {
          // If the token is found in the URL and the field exists,
          // set its value. This will override th:value if both are present
          // and this script runs after Thymeleaf has processed the template.
          // If th:value is meant to be the primary source, you might add a check:
          // if (hiddenTokenField && tokenValueFromUrl && !hiddenTokenField.value) {
          hiddenTokenField.value = tokenValueFromUrl;
          console.log("Token field populated from URL parameter.");
        } else if (tokenValueFromUrl) {
            console.warn("Token found in URL, but hidden input field with name='token' was not found in the DOM.");
        }
      });
    </script>
  </body>
</html>
