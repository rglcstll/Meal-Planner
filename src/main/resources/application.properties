# Spring Boot Application
spring.application.name=demo

# ===================================================================
# PRODUCTION DATABASE CONFIGURATION
# ===================================================================
# IMPORTANT: Replace with your actual production database URL and username.
# Your current settings are for a local development database (localhost, root, no password).
# Example for production: spring.datasource.url=jdbc:mysql://your_prod_db_host:3306/your_prod_db_name
spring.datasource.url=jdbc:mysql://localhost:3306/appdev
spring.datasource.username=root
# IMPORTANT: Externalize this password in production! Do NOT hardcode a real password here.
# Your current setting is an empty password, which is NOT secure for production.
# Production databases MUST have strong passwords.
# Options: Environment variables (e.g., spring.datasource.password=${DB_PASSWORD}), Vault, Spring Cloud Config.
spring.datasource.password=

# ===================================================================
# JPA AND HIBERNATE CONFIGURATION
# ===================================================================
# Show SQL in logs (consider setting to false in production for less noise and better performance)
spring.jpa.show-sql=true

# DDL-auto: 'validate' or 'none' is recommended for production.
# 'update' (your original setting) can be risky as it might attempt to alter your database schema automatically.
# 'validate': validates the schema, makes no changes to the database.
# 'none': no DDL is performed.
# Use a migration tool like Flyway or Liquibase for schema changes in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false

# MySQL Dialect (Matches your original file)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Open-in-view (Matches your original file)
# Setting to false is generally recommended to avoid lazy loading issues
# outside of transactional contexts and to have more explicit data fetching.
spring.jpa.open-in-view=false

# Enable Lazy Load No Trans (Matches your original file)
# This property can help avoid LazyInitializationException if you access lazy-loaded
# associations outside of an active Hibernate session. However, it can also mask
# N+1 query problems and might lead to unexpected behavior or performance issues.
# It's generally better to design your service layer to fetch all necessary data
# within transactions (e.g., using JOIN FETCH or EntityGraphs).
# Evaluate if this is truly needed for your production setup.
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===================================================================
# PRODUCTION EMAIL CONFIGURATION
# ===================================================================
# Using values from your original file.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rogelangelo2@gmail.com
# IMPORTANT: Externalize this password in production! Do NOT hardcode your real password here.
# The value below is from your original file. REPLACE and EXTERNALIZE for production.
# Using a personal Gmail account for application emails is generally not recommended for production
# due to sending limits and security concerns (consider dedicated email services like SendGrid, Mailgun, AWS SES).
# If using Gmail, ensure you are using an "App Password" if 2-Step Verification is enabled.
