spring.mail.password=zkhy mnoj kvey vqce

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Trust the SMTP server (this is standard for Gmail)
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ===================================================================
# APPLICATION SPECIFIC CONFIGURATION
# ===================================================================
# IMPORTANT: Set this to the base URL of your deployed application on Tomcat.
# This is used by EmailService to generate correct links (e.g., password reset, email confirmation).
# Example (if deployed to root): app.base-url=https://www.yourdomain.com
# Example (if deployed with context path /myapp): app.base-url=https://www.yourdomain.com/myapp
app.base-url=http://localhost:8080/mealplanner

# CORS Configuration for WebConfig.java
# IMPORTANT: Set this to your frontend's production URL.
# Can be a comma-separated list if multiple origins are allowed.
# Example: cors.allowed-origins=https://your-production-frontend.com,https://another-frontend.com
# The default in your WebConfig.java is http://localhost:3000, which is for development.
cors.allowed-origins=http://localhost:3000,http://localhost:8080

# ===================================================================
# SERVER CONFIGURATION (Tomcat specific for WAR deployment)
# ===================================================================
# If you deploy your WAR as 'myapp.war' to Tomcat's webapps folder,
# it might be accessible at /myapp by default.
# If you want to explicitly set the context path (e.g., /api if your app is purely an API),
# uncomment and set the line below. If your WAR is named ROOT.war and deployed to the root,
# you might not need this or set it to /.
server.servlet.context-path=/mealplanner

# Bind the embedded server to all available network interfaces.
# This allows your application to be accessed via 'localhost' (127.0.0.1)
# and any IP address your machine currently has (e.g., its Wi-Fi IP address).
# You won't need to change this property when your Wi-Fi IP address changes;
# the server will automatically listen on the new IP.
server.address=0.0.0.0

# Explicitly set the server port (matches the port in your app.base-url).
# The default for Spring Boot embedded Tomcat is often 8080.
# Your app.base-url currently uses 8080.
server.port=8080

# ===================================================================
# LOGGING CONFIGURATION (Adjusted for production)
# ===================================================================
# Set general logging level for Spring Boot
logging.level.root=INFO
# Set logging level for your application's packages
logging.level.com.example.demo=INFO
# Spring Security logging (set to INFO or WARN for production)
# Your original file had DEBUG, which is too verbose for production.
logging.level.org.springframework.security=INFO
# logging.level.org.springframework.security.web=INFO # Covered by the line above

# Hibernate logging (set to WARN or ERROR for production to reduce noise from SQL statements etc.)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN